[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
nirvana = "DygVVPMyA2WnbfJiqta38ySR3YhnKbqbFcNzcsjkti4K"

[programs.localnet]
nirvana = "DygVVPMyA2WnbfJiqta38ySR3YhnKbqbFcNzcsjkti4K"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Node >= 23 strips TS types natively and loads .ts as ESM, which breaks the
# CommonJS named imports from @coral-xyz/anchor. Disable native stripping so
# ts-node (via ts-mocha) compiles the suite to CommonJS instead.
test = "NODE_OPTIONS=--no-experimental-strip-types ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.ts'"
