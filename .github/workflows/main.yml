name: Nirvana CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --tag v1.0.0 --locked --force

      - name: Build program
        run: |
          CARGO_TARGET_DIR="$PWD/target" ANCHOR_IGNORE_KEYS=1 anchor build --ignore-keys

      - name: Verify artifacts
        run: |
          test -f target/deploy/nirvana.so
          test -f target/idl/nirvana_protocol.json

      - name: Install Node dependencies
        run: npm install

      - name: Generate CI wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase -o "$HOME/.config/solana/id.json" --force

      - name: Run integration tests
        run: chmod +x run-tests.sh && ./run-tests.sh
