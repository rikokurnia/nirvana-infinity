name: Nirvana CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Solana CLI
        run: |
          set -e
          wget https://github.com/solana-labs/solana/releases/download/v1.18.15/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar -xjf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$PWD/solana-release/bin" >> $GITHUB_PATH
          export PATH="$PWD/solana-release/bin:$PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --force anchor-cli --version 0.29.0 --no-default-features

      - name: Build Program (The Nuclear Option)
        run: |
          # Hapus lockfile yang bermasalah agar CI generate ulang yang kompatibel
          rm -f Cargo.lock
          rm -f programs/nirvana/Cargo.lock
          
          # Jalankan build
          anchor build