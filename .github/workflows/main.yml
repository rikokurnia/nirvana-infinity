name: Nirvana CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Install Rust Nightly (Needed for -Z flags)
      - name: Install Rust Nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      # 3. Install Solana CLI
      - name: Install Solana CLI
        run: |
          set -e
          wget https://github.com/solana-labs/solana/releases/download/v1.18.15/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar -xjf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$PWD/solana-release/bin" >> $GITHUB_PATH
          export PATH="$PWD/solana-release/bin:$PATH"

      # 4. Install Anchor CLI
      - name: Install Anchor CLI
        run: |
          cargo install --force anchor-cli --version 0.29.0 --no-default-features

      # 5. Build with Requested Specification
      - name: Build Program
        run: |
          # Mengikuti spek error: menggunakan flag -Z untuk handle lockfile v4
          export RUSTFLAGS="-Znext-lockfile-bump"
          anchor build