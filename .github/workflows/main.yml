name: Nirvana CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust and Cargo
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          # Menambahkan path secara permanen ke environment GitHub
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          # Perbaikan instalasi anchor menggunakan metode yang lebih ringan
          cargo install --force anchor-cli --version 0.29.0 --no-default-features

      - name: Build Program
        run: |
          # Menjalankan build dengan path yang sudah diperbarui
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          anchor build