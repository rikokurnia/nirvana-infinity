name: Nirvana CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Solana
        # Perbaikan path: menggunakan '/' untuk masuk ke sub-directory action
        uses: metaplex-foundation/actions/setup-solana@v1
        with:
          solana-version: '1.18.15'

      - name: Install Anchor CLI
        run: |
          cargo install --force anchor-cli --version 0.29.0 --no-default-features

      - name: Build Program
        run: |
          anchor build